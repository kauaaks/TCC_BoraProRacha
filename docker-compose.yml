version: "3.9"

services:
  app:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm run dev"
    ports:
      - "5000:5000"
      - "5173:5173"
    env_file:
      - ./backend/.env
    volumes:
      - .:/app
      - node_modules_root:/app/node_modules
      - node_modules_back:/app/backend/node_modules
      - node_modules_front:/app/front/node_modules

volumes:
  node_modules_root:
  node_modules_back:
  node_modules_front:
